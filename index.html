<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Groovy — Agentic DAW</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --display: 'Instrument Serif', Georgia, serif;
    --sans: 'Inter Tight', -apple-system, BlinkMacSystemFont, sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #EBE1D2; }
  body { font-family: var(--sans); -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
  button { font-family: inherit; }
  textarea { font-family: inherit; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: rgba(40,28,18,0.2); border-radius: 5px; border: 2px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-track { background: transparent; }

  @keyframes recordPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(179,38,30,0.6); }
    50%      { box-shadow: 0 0 0 8px rgba(179,38,30,0); }
  }
  @keyframes armPulse {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.55; }
  }
  @keyframes genieOpen {
    0%   { opacity: 0; transform: translateY(40px) scale(0.4); filter: blur(6px); }
    60%  { opacity: 1; filter: blur(0); }
    100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
  }
  @keyframes genieClose {
    0%   { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(20px) scale(0.6); filter: blur(4px); }
  }
  @keyframes smokeRise {
    0%   { transform: translateY(0) scale(0.8); opacity: 0.9; }
    100% { transform: translateY(-30px) scale(1.4); opacity: 0; }
  }
  @keyframes genieOrb {
    0%, 100% { box-shadow: 0 0 0 2px rgba(35,64,232,0.12), 0 0 16px rgba(35,64,232,0.35); }
    50%      { box-shadow: 0 0 0 3px rgba(35,64,232,0.18), 0 0 24px rgba(35,64,232,0.5); }
  }
  @keyframes insertFlash {
    0%   { opacity: 1; }
    100% { opacity: 0; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/main.tsx"></script>
</body>
</html>
