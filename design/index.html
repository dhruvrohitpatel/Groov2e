<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Groovy — Agentic DAW</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --display: 'Instrument Serif', Georgia, serif;
    --sans: 'Inter Tight', -apple-system, BlinkMacSystemFont, sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #EBE1D2; }
  body { font-family: var(--sans); -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
  button { font-family: inherit; }
  textarea { font-family: inherit; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: rgba(40,28,18,0.2); border-radius: 5px; border: 2px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-track { background: transparent; }

  @keyframes recordPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(179,38,30,0.6); }
    50%      { box-shadow: 0 0 0 8px rgba(179,38,30,0); }
  }
  @keyframes armPulse {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.55; }
  }
  @keyframes genieOpen {
    0%   { opacity: 0; transform: translateY(40px) scale(0.4); filter: blur(6px); }
    60%  { opacity: 1; filter: blur(0); }
    100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
  }
  @keyframes genieClose {
    0%   { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(20px) scale(0.6); filter: blur(4px); }
  }
  @keyframes smokeRise {
    0%   { transform: translateY(0) scale(0.8); opacity: 0.9; }
    100% { transform: translateY(-30px) scale(1.4); opacity: 0; }
  }
  @keyframes genieOrb {
    0%, 100% { box-shadow: 0 0 0 2px rgba(35,64,232,0.12), 0 0 16px rgba(35,64,232,0.35); }
    50%      { box-shadow: 0 0 0 3px rgba(35,64,232,0.18), 0 0 24px rgba(35,64,232,0.5); }
  }
  @keyframes insertFlash {
    0%   { opacity: 1; }
    100% { opacity: 0; }
  }
</style>
</head>
<body>
<div id="root"></div>

<template id="__bundler_thumbnail">
  <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <rect width="200" height="200" fill="#EBE1D2"/>
    <g transform="translate(100 110)">
      <path d="M-40 10 C-50 10 -55 4 -55 -4 C-55 -16 -40 -24 -20 -24 L10 -24 C16 -24 22 -22 28 -18 L54 -30 L48 -8 L44 -2 C50 4 52 10 52 16 C52 24 46 30 34 30 L-40 30 Z"
        fill="#B8823A" stroke="#1a1210" stroke-width="1.2"/>
      <path d="M-55 -4 C-65 -10 -70 -16 -70 -20 C-70 -24 -66 -26 -58 -22" stroke="#B8823A" stroke-width="3" fill="none"/>
      <circle cx="-20" cy="-28" r="3" fill="#B8823A"/>
    </g>
    <text x="100" y="170" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="24" fill="#2B241C">Groovy</text>
  </svg>
</template>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components/icons.jsx"></script>
<script type="text/babel" src="components/waveform.jsx"></script>
<script type="text/babel" src="components/model.jsx"></script>
<script type="text/babel" src="components/controls.jsx"></script>
<script type="text/babel" src="components/timeline.jsx"></script>
<script type="text/babel" src="components/transport.jsx"></script>
<script type="text/babel" src="components/genie.jsx"></script>
<script type="text/babel" src="components/phone.jsx"></script>
<script type="text/babel" src="components/tweaks.jsx"></script>
<script type="text/babel" src="components/app.jsx"></script>

<script type="text/babel" data-presets="react">
  // Poll for App to exist (babel transpiles scripts async), then mount.
  (function mount(){
    if (typeof window.App === 'function') {
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App/>);
    } else {
      setTimeout(mount, 30);
    }
  })();
</script>
</body>
</html>
